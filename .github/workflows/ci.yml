name: CI

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-check:
    name: Rust — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spectralfilm-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('spectralfilm-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (host target)
        working-directory: spectralfilm-rs
        run: cargo check --workspace

  ndk-check:
    name: Rust — cargo check NDK (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spectralfilm-rs/target
          key: ${{ runner.os }}-aarch64-cargo-${{ hashFiles('spectralfilm-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-aarch64-cargo-
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Install Android NDK r27c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -O ndk.zip
          unzip -q ndk.zip -d $HOME
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r27c" >> $GITHUB_ENV
      - name: cargo check spectralfilm-ndk
        working-directory: spectralfilm-rs
        run: cargo ndk --target aarch64-linux-android --platform 24 check -p spectralfilm-ndk

  android-build:
    name: Android — build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK (pre-built .so)
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
